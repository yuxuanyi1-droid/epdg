node_id: epdg.local
http:
  listen: ":19090"
ipsec:
  backend: swanctl
  mode: passive
  swanctl_bin: /usr/sbin/swanctl
  connection_name: epdg-ike
  child_prefix: ue
aaa:
  backend: pyhss_api
  origin_host: epdg.localdomain
  origin_realm: localdomain
  pyhss_api:
    base_url: http://127.0.0.1:8080
    timeout_seconds: 5
protocol:
  plmn:
    mcc: "001"
    mnc: "001"
  swu:
    local_address: 10.46.0.2
    ike_port: 500
    natt_port: 4500
  s2b:
    backend: gtpv2_echo
    pgw_address: 127.0.0.4
    gtpv2_port: 2123
